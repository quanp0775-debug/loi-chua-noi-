<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Trà My</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{overflow:hidden;}

#loginPage{
    width:100vw;height:100vh;background:#c8a27a;
    display:flex;justify-content:center;align-items:center;
    position:relative;overflow:hidden;
}

.loginBox{
    background:#f6eadb;padding:35px;border-radius:20px;
    width:340px;text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    z-index:10;
}

.mainTitle{
    font-size:34px;font-weight:900;letter-spacing:5px;
    color:#5c4033;margin-bottom:8px;
    text-transform:uppercase;
}

.subTitle{
    font-size:13px;letter-spacing:4px;
    color:#8b6f58;margin-bottom:12px;
    text-transform:uppercase;
}

.quote{
    font-size:13px;color:#9b8069;
    margin-bottom:22px;font-style:italic;
}

input{
    width:100%;padding:12px;margin-top:10px;
    border:none;border-radius:10px;outline:none;
}

.note{
    font-size:13px;color:#7a5a45;
    margin-top:5px;margin-bottom:10px;
}

button{
    width:100%;padding:12px;border:none;
    border-radius:10px;background:#8b5e3c;
    color:white;cursor:pointer;margin-top:10px;
    font-size:15px;
}

.bear{
    position:absolute;
    bottom:-120px;
    font-size:60px;
    animation:bearFloat linear infinite;
}

@keyframes bearFloat{
    from{transform:translateY(0);}
    to{transform:translateY(-130vh);}
}

#envelopePage{
    display:none;width:100vw;height:100vh;
    background:linear-gradient(to bottom,#ffe6ee,#fff7fa);
    position:relative;overflow:hidden;
}

.envelope{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-size:160px;cursor:pointer;z-index:10;
}

.tapText{
    position:absolute;top:68%;left:50%;
    transform:translateX(-50%);
    font-size:22px;color:#555;z-index:10;
}

#letter{
    display:none;position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:85%;max-width:700px;
    background:#fffdf8;padding:40px;
    border-radius:20px;
    box-shadow:0 10px 35px rgba(0,0,0,.15);
    z-index:20;
}

#letter h1{text-align:center;margin-bottom:20px;}
#letter p{line-height:2;font-size:18px;color:#444;}

.balloon{
    position:absolute;
    bottom:-150px;
    font-size:45px;
    animation:balloonFloat linear infinite;
}

@keyframes balloonFloat{
    from{transform:translateY(0);}
    to{transform:translateY(-130vh);}
}
</style>
</head>
<body>

<div id="loginPage">
    <div class="loginBox">

        <h2 class="mainTitle">LỜI CHƯA NÓI</h2>

        <div class="subTitle">
            DÀNH CHO NGƯỜI ĐẶC BIỆT
        </div>

        <div class="quote">
            Có những điều không thể nói trực tiếp...
        </div>

        <input type="text" id="username" placeholder="Tên đăng nhập">

        <div class="note">
            💡 Họ và tên của bạn
        </div>

        <input type="password" id="password" placeholder="Mật khẩu">

        <button onclick="login()">MỞ BÍ MẬT ✨</button>

    </div>
</div>

<div id="envelopePage">

    <div class="envelope" onclick="openLetter()">💌</div>

    <div class="tapText">
        Nhấn vào phong bì để mở
    </div>

    <div id="letter">
        <h1>🌷</h1>
        <p>
            ABCD<br><br>
            ABCD ABCD ABCD ABCD ABCD.<br><br>
            ABCD ABCD ABCD ABCD.<br><br>
            ABCD ABCD ABCD.<br><br>
            ❤️
        </p>
    </div>

</div>

<script>
function login(){
    const user=document.getElementById("username").value.trim();
    const pass=document.getElementById("password").value.trim();

    if(user==="Trần Thị Trà My" && pass==="12345678"){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("envelopePage").style.display="block";
    }else{
        alert("Sai tên đăng nhập hoặc mật khẩu 😝");
    }
}

function openLetter(){
    document.querySelector(".envelope").style.display="none";
    document.querySelector(".tapText").style.display="none";
    document.getElementById("letter").style.display="block";
}

for(let i=0;i<18;i++){
    let bear=document.createElement("div");
    bear.className="bear";
    bear.innerHTML="🧸";
    bear.style.left=Math.random()*100+"vw";
    bear.style.animationDuration=(10+Math.random()*10)+"s";
    bear.style.animationDelay=Math.random()*10+"s";
    document.getElementById("loginPage").appendChild(bear);
}

for(let i=0;i<30;i++){
    let balloon=document.createElement("div");
    balloon.className="balloon";
    balloon.innerHTML="🎈";
    balloon.style.left=Math.random()*100+"vw";
    balloon.style.animationDuration=(8+Math.random()*10)+"s";
    balloon.style.animationDelay=Math.random()*8+"s";
    document.getElementById("envelopePage").appendChild(balloon);
}
</script>

</body>
</html>
